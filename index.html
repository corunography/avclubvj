<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AV Club VJ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f; color: #fff;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    .icon  { font-size: 48px; margin-bottom: 16px; }
    h1     { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .sub   { font-size: 14px; color: #888; margin-bottom: 20px; text-align: center; line-height: 1.5; }

    /* ── Tab switcher ── */
    .tabs {
      display: flex; gap: 0; margin-bottom: 24px;
      background: #1c1c1e; border-radius: 12px; padding: 4px;
      width: 100%; max-width: 440px;
    }
    .tab-btn {
      flex: 1; padding: 10px; border: none; background: transparent;
      color: #888; font-size: 15px; font-weight: 600; font-family: inherit;
      border-radius: 9px; cursor: pointer; transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active { background: #2c2c2e; color: #fff; }

    /* ── Message form ── */
    #msg-form { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; }
    .username-row {
      width: 100%; display: flex; align-items: center; gap: 10px;
      background: #1c1c1e; border: 1.5px solid #333; border-radius: 14px;
      padding: 10px 16px; margin-bottom: 10px; transition: border-color 0.2s;
    }
    .username-row:focus-within { border-color: #3a7bd5; }
    .username-at { color: #555; font-size: 18px; font-weight: 700; flex-shrink: 0; }
    .username-row input {
      flex: 1; background: transparent; border: none; outline: none;
      color: #fff; font-size: 16px; font-family: inherit; -webkit-appearance: none;
    }
    .username-row input::placeholder { color: #555; }
    textarea {
      width: 100%; height: 110px;
      background: #1c1c1e; border: 1.5px solid #333; border-radius: 14px;
      color: #fff; font-size: 16px; font-family: inherit;
      padding: 14px 16px; resize: none; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    textarea:focus { border-color: #3a7bd5; }
    textarea::placeholder { color: #555; }
    .char-count { font-size: 11px; color: #555; text-align: right; width: 100%; margin-top: 6px; margin-bottom: 14px; }
    .char-count.warn { color: #ff9500; }

    /* ── Photo form ── */
    #photo-form { width: 100%; max-width: 440px; display: none; flex-direction: column; gap: 12px; }
    .pick-area {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 10px; background: #1c1c1e; border: 1.5px dashed #333;
      border-radius: 16px; padding: 32px 20px; cursor: pointer;
      transition: border-color 0.2s; -webkit-tap-highlight-color: transparent;
    }
    .pick-area:active { border-color: #3a7bd5; }
    .pick-area .pick-icon { font-size: 40px; }
    .pick-area .pick-txt  { font-size: 15px; color: #888; text-align: center; }
    #photo-preview-wrap { display: none; position: relative; }
    #photo-preview {
      width: 100%; border-radius: 12px; display: block;
      object-fit: contain; max-height: 280px; background: #000;
    }
    .rm-btn {
      position: absolute; top: 8px; right: 8px;
      background: rgba(0,0,0,0.75); border: none; color: #fff;
      border-radius: 50%; width: 30px; height: 30px; font-size: 16px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .caption-input {
      width: 100%; background: #1c1c1e; border: 1.5px solid #333;
      border-radius: 12px; color: #fff; font-size: 15px; font-family: inherit;
      padding: 12px 16px; outline: none; transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    .caption-input:focus { border-color: #3a7bd5; }
    .caption-input::placeholder { color: #555; }
    #file-input { display: none; }

    /* ── Trivia form ── */
    #trivia-form { width: 100%; max-width: 480px; display: none; flex-direction: column; gap: 12px; }
    .trivia-question-box {
      background: #1c1c1e; border-radius: 16px; padding: 18px 20px;
      font-size: 17px; font-weight: 700; line-height: 1.4; text-align: center; color: #fff;
    }
    .trivia-category { font-size: 11px; color: #666; text-align: center; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .trivia-opts-grid { display: flex; flex-direction: column; gap: 8px; }
    .trivia-opt-btn {
      width: 100%; background: #1c1c1e; border: 1.5px solid #333;
      border-radius: 12px; color: #fff; font-size: 15px; font-weight: 500;
      font-family: inherit; padding: 14px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent; text-align: left;
    }
    .trivia-opt-btn:active { transform: scale(0.98); }
    .trivia-opt-btn.selected { background: #1a3a6e; border-color: #3a7bd5; }
    .trivia-opt-letter {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.1); color: #aaa;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .trivia-opt-btn.selected .trivia-opt-letter { background: #3a7bd5; color: #fff; }
    .team-input {
      width: 100%; background: #1c1c1e; border: 1.5px solid #333;
      border-radius: 12px; color: #fff; font-size: 15px; font-family: inherit;
      padding: 12px 16px; outline: none; transition: border-color 0.2s;
    }
    .team-input:focus { border-color: #3a7bd5; }
    .team-input::placeholder { color: #555; }
    #trivia-status { font-size: 13px; text-align: center; min-height: 18px; }
    #trivia-waiting { font-size: 13px; color: #666; text-align: center; margin-top: 8px; }

    /* ── Shared button ── */
    button.main-btn {
      width: 100%; max-width: 440px;
      padding: 16px; background: #3a7bd5; color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    button.main-btn:hover  { background: #2d6bc4; }
    button.main-btn:active { transform: scale(0.98); }
    button.main-btn:disabled { background: #2c2c2e; color: #555; cursor: not-allowed; transform: none; }
    #status       { margin-top: 18px; font-size: 14px; text-align: center; min-height: 20px; max-width: 440px; line-height: 1.5; }
    #photo-status { font-size: 14px; text-align: center; min-height: 20px; line-height: 1.5; }
    .success { color: #34c759; font-weight: 600; }
    .error   { color: #ff453a; }
    .error-setup { color: #ff9500; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="icon" id="page-icon">🎶</div>
  <h1 id="page-title">Send a Message</h1>
  <p class="sub" id="page-sub">Your message may appear on the big screen!</p>

  <!-- Tab switcher (hidden in trivia mode) -->
  <div class="tabs" id="tabs">
    <button class="tab-btn active" id="tab-msg"   onclick="switchTab('msg')">💬 Message</button>
    <button class="tab-btn"        id="tab-photo" onclick="switchTab('photo')">📸 Photo</button>
  </div>

  <!-- Normal message form -->
  <div id="msg-form">
    <div class="username-row">
      <span class="username-at">@</span>
      <input type="text" id="username" placeholder="your username (optional)" maxlength="40" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <textarea id="msg" placeholder="Type your message here…" maxlength="240" oninput="onInput()"></textarea>
    <div class="char-count" id="char-count">0 / 240</div>
    <button class="main-btn" id="btn" onclick="sendMsg()">Send It!</button>
    <div id="status"></div>
  </div>

  <!-- Photo form -->
  <div id="photo-form">
    <input type="file" id="file-input" accept="image/*">
    <label for="file-input" class="pick-area" id="pick-area">
      <span class="pick-icon">📷</span>
      <span class="pick-txt">Tap to take a photo<br>or choose from your library</span>
    </label>
    <div id="photo-preview-wrap">
      <img id="photo-preview" alt="Preview">
      <button class="rm-btn" id="rm-btn" title="Remove photo">✕</button>
    </div>
    <input type="text" class="caption-input" id="photo-caption" placeholder="Add a caption (optional)" maxlength="100">
    <!-- Progress bar -->
    <div id="photo-progress-wrap" style="display:none;width:100%;background:#1c1c1e;border-radius:99px;height:8px;overflow:hidden">
      <div id="photo-progress-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#3a7bd5,#5b9cf6);border-radius:99px;transition:width 0.2s ease"></div>
    </div>
    <button class="main-btn" id="photo-btn" onclick="sendPhoto()" disabled>Send Photo!</button>
    <div id="photo-status"></div>
  </div>

  <!-- Trivia: registration -->
  <div id="trivia-register-wrap" style="display:none;width:100%;max-width:440px;flex-direction:column;gap:12px">
    <div style="text-align:center;font-size:14px;color:#888;line-height:1.6">Enter your team name to join the game.<br>You'll be locked in for the session.</div>
    <input type="text" id="team-name-reg-input" class="team-input" placeholder="Team name…" maxlength="30" style="text-align:center;font-size:18px;font-weight:700">
    <button class="main-btn" id="btn-join-trivia" onclick="joinTrivia()">Join Game</button>
    <div id="join-status" style="font-size:13px;color:#ff453a;text-align:center;min-height:18px"></div>
    <div id="known-teams-list" style="display:none;font-size:11px;color:#666;text-align:center;line-height:1.8"></div>
  </div>

  <!-- Trivia: registered / waiting -->
  <div id="trivia-playing-badge" style="display:none;font-size:13px;color:#888;text-align:center;margin-bottom:8px;max-width:440px">
    Playing as <strong style="color:#fff" id="trivia-playing-name"></strong>
    <span style="color:#3a7bd5;cursor:pointer;margin-left:8px;font-size:11px" onclick="changeTeam()">Change</span>
  </div>

  <!-- Trivia form -->
  <div id="trivia-form">
    <div class="trivia-category" id="trivia-category"></div>
    <div class="trivia-question-box" id="trivia-q"></div>
    <div class="trivia-opts-grid" id="trivia-opts"></div>
    <button class="main-btn" id="trivia-btn" onclick="submitTrivia()">Submit Answer</button>
    <div id="trivia-status"></div>
  </div>

  <div id="trivia-waiting" style="display:none">⏳ Waiting for the next question…</div>

  <script>
    const params    = new URLSearchParams(location.search);
    const topic     = params.get('t');
    const mode      = params.get('mode') || '';  // 'trivia' = trivia-only page
    const workerUrl = (params.get('w') || '').replace(/\/$/, '');
    const ntfyAk    = params.get('ak') || '';   // ntfy auth token (passed via QR URL)
    const qTopic    = topic ? topic + '-q' : null;
    const aTopic    = topic ? topic + '-a' : null;

    // URL-based auth avoids CORS preflight (no custom headers needed)
    const ntfyAuthParam = ntfyAk ? '&auth=' + btoa(':' + ntfyAk) : '';

    // Normalise worker URL — ensure it has a protocol
    const workerBase = workerUrl
      ? (workerUrl.startsWith('http') ? workerUrl : 'https://' + workerUrl).replace(/\/$/, '')
      : '';

    // Build ntfy POST URL — use Worker proxy when available
    function ntfyPostUrl(t) {
      return workerBase ? `${workerBase}/${t}` : `https://ntfy.sh/${t}`;
    }

    // Build ntfy poll URL
    function ntfyPollUrl(t, since) {
      return workerBase
        ? `${workerBase}/${t}/json?poll=1&since=${since}`
        : `https://ntfy.sh/${t}/json?poll=1&since=${since}`;
    }

    // Team identity (persisted across sessions)
    let myTeam    = localStorage.getItem('trivia-team')  || '';
    let myToken   = localStorage.getItem('trivia-token') || '';
    let knownTeams = []; // list of registered team names broadcast by app

    function generateToken() {
      try { return crypto.randomUUID(); } catch(e) {}
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    // Fetch with a hard timeout so requests never hang indefinitely
    function fetchWithTimeout(url, options, ms = 10000) {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { ...options, signal: ctrl.signal })
        .finally(() => clearTimeout(tid));
    }

    function renderKnownTeams() {
      const el = document.getElementById('known-teams-list');
      if (!el || knownTeams.length === 0) return;
      el.textContent = 'Teams playing: ' + knownTeams.join(' · ');
      el.style.display = 'block';
    }

    if (!topic) {
      document.getElementById('btn').disabled = true;
      document.getElementById('status').innerHTML =
        '<span class="error-setup">No venue code in this link.<br>Please ask the venue for the correct QR code.</span>';
    }

    // ── Tab switcher ──────────────────────────────────────────────────────────
    let activeTab = 'msg';
    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-msg').classList.toggle('active', tab === 'msg');
      document.getElementById('tab-photo').classList.toggle('active', tab === 'photo');
      document.getElementById('msg-form').style.display   = tab === 'msg'   ? 'flex'  : 'none';
      document.getElementById('photo-form').style.display = tab === 'photo' ? 'flex'  : 'none';
      if (tab === 'msg') {
        document.getElementById('page-icon').textContent  = '🎶';
        document.getElementById('page-title').textContent = 'Send a Message';
        document.getElementById('page-sub').textContent   = 'Your message may appear on the big screen!';
      } else {
        document.getElementById('page-icon').textContent  = '📸';
        document.getElementById('page-title').textContent = 'Share a Photo';
        document.getElementById('page-sub').textContent   = 'Your photo could appear on screen!';
      }
    }

    // ── Message form ──────────────────────────────────────────────────────────
    // Restore saved username
    const usernameEl = document.getElementById('username');
    if (usernameEl) {
      usernameEl.value = localStorage.getItem('msg-username') || '';
      usernameEl.addEventListener('change', () => {
        localStorage.setItem('msg-username', usernameEl.value.trim());
      });
    }

    function onInput() {
      const len = document.getElementById('msg').value.length;
      const el  = document.getElementById('char-count');
      el.textContent = len + ' / 240';
      el.className   = 'char-count' + (len > 200 ? ' warn' : '');
    }

    const COOLDOWN_SEC = 12;
    let cooldownTimer  = null;

    function startCooldown() {
      const btn = document.getElementById('btn');
      let remaining = COOLDOWN_SEC;
      btn.disabled = true;
      btn.textContent = `Wait ${remaining}s…`;
      if (cooldownTimer) clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(cooldownTimer); cooldownTimer = null;
          btn.disabled = false; btn.textContent = 'Send Another!';
        } else {
          btn.textContent = `Wait ${remaining}s…`;
        }
      }, 1000);
    }

    function getOrCreateAnonId() {
      let id = localStorage.getItem('anon-id');
      if (!id) { id = String(Math.floor(1000 + Math.random() * 9000)); localStorage.setItem('anon-id', id); }
      return id;
    }

    async function sendMsg() {
      const rawText = document.getElementById('msg').value.trim();
      const username = (document.getElementById('username')?.value || '').trim();
      if (username) localStorage.setItem('msg-username', username);
      const displayName = username || ('Anonymous_' + getOrCreateAnonId());
      const text = displayName + ':  ' + rawText;
      if (!rawText || !topic) return;
      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true; btn.textContent = 'Sending…';
      status.textContent = ''; status.className = '';
      try {
        const res = await fetchWithTimeout(ntfyPostUrl(topic), {
          method: 'POST', body: text,
          headers: { 'Content-Type': 'text/plain' },
        });
        if (!res.ok) {
          const body = await res.text().catch(() => '');
          const isQuota = body.includes('daily message quota') || body.includes('daily') || body.includes('quota');
          throw Object.assign(new Error('HTTP ' + res.status), { status: res.status, isQuota });
        }
        status.innerHTML = '✓ Sent! It may appear on screen shortly.';
        status.className = 'success';
        document.getElementById('msg').value = '';
        onInput();
        startCooldown();
      } catch(e) {
        const isTimeout = e.name === 'AbortError';
        status.textContent = isTimeout
          ? '✗ Request timed out — check your connection and try again.'
          : e.isQuota
            ? '✗ Message limit reached for today — please try again tomorrow!'
            : e.status === 429
              ? '✗ Too many messages — wait a moment and try again.'
              : '✗ Failed to send — check your connection and try again.';
        status.className = 'error';
        btn.textContent = 'Send It!'; btn.disabled = false;
      }
    }

    document.getElementById('msg')?.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    // ── Photo form ────────────────────────────────────────────────────────────
    let resizedDataUrl = null;

    const fileInput   = document.getElementById('file-input');
    const pickArea    = document.getElementById('pick-area');
    const previewWrap = document.getElementById('photo-preview-wrap');
    const previewImg  = document.getElementById('photo-preview');
    const rmBtn       = document.getElementById('rm-btn');
    const photoBtn    = document.getElementById('photo-btn');
    const photoStatus = document.getElementById('photo-status');

    fileInput.addEventListener('change', async () => {
      const file = fileInput.files[0];
      if (!file) return;
      photoStatus.textContent = 'Resizing…';
      resizedDataUrl = await resizeImage(file, 1024, 0.80);
      previewImg.src = resizedDataUrl;
      previewWrap.style.display = 'block';
      pickArea.style.display    = 'none';
      photoBtn.disabled = false;
      photoStatus.textContent = '';
    });

    rmBtn.addEventListener('click', () => {
      resizedDataUrl = null;
      previewImg.src = '';
      previewWrap.style.display = 'none';
      pickArea.style.display    = 'flex';
      photoBtn.disabled = true;
      fileInput.value = '';
      photoStatus.textContent = '';
    });

    function sendPhoto() {
      if (!resizedDataUrl || !topic || !workerBase) {
        photoStatus.innerHTML = '<span class="error">Photo uploads require a worker URL — please use the venue QR code.</span>';
        return;
      }
      const caption     = (document.getElementById('photo-caption')?.value || '').trim();
      const progressWrap = document.getElementById('photo-progress-wrap');
      const progressBar  = document.getElementById('photo-progress-bar');

      photoBtn.disabled = true;
      photoStatus.textContent = '';
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';

      const payload = JSON.stringify({ dataUrl: resizedDataUrl, caption });
      const xhr     = new XMLHttpRequest();
      xhr.open('POST', `${workerBase}/photos?venueId=${encodeURIComponent(topic)}`);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.timeout = 25000;

      xhr.upload.onprogress = e => {
        if (e.lengthComputable) {
          progressBar.style.width = Math.round((e.loaded / e.total) * 100) + '%';
        }
      };

      xhr.onload = () => {
        progressBar.style.width = '100%';
        setTimeout(() => { progressWrap.style.display = 'none'; progressBar.style.width = '0%'; }, 600);
        if (xhr.status >= 200 && xhr.status < 300) {
          photoStatus.innerHTML = '<span class="success">✓ Photo submitted — watch the screen!</span>';
          resizedDataUrl = null;
          previewImg.src = '';
          previewWrap.style.display = 'none';
          pickArea.style.display    = 'flex';
          document.getElementById('photo-caption').value = '';
          fileInput.value = '';
          setTimeout(() => { photoBtn.disabled = false; }, 15000);
        } else {
          photoStatus.innerHTML = '<span class="error">✗ Upload failed (error ' + xhr.status + ') — please try again.</span>';
          photoBtn.disabled = false;
        }
      };

      xhr.onerror = xhr.ontimeout = () => {
        progressWrap.style.display = 'none';
        photoStatus.innerHTML = '<span class="error">✗ Upload failed — check your connection and try again.</span>';
        photoBtn.disabled = false;
      };

      xhr.send(payload);
    }

    function resizeImage(file, maxPx, quality) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            if (w > maxPx || h > maxPx) {
              if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; }
              else        { w = Math.round(w * maxPx / h); h = maxPx; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── Trivia mode ───────────────────────────────────────────────────────────
    let currentQ       = null;
    let selectedAnswer = -1;
    let triviaLastId   = null;
    let triviaAnswered = false;

    const LETTERS = ['A','B','C','D'];

    function hideAllForms() {
      ['msg-form','photo-form','trivia-register-wrap','trivia-form','trivia-waiting','tabs'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const badge = document.getElementById('trivia-playing-badge');
      if (badge) badge.style.display = 'none';
    }

    function showRegister() {
      hideAllForms();
      document.getElementById('page-icon').textContent  = '🧠';
      document.getElementById('page-title').textContent = 'Bar Trivia';
      document.getElementById('page-sub').textContent   = 'Register your team to play!';
      const wrap = document.getElementById('trivia-register-wrap');
      if (wrap) wrap.style.display = 'flex';
      renderKnownTeams();
    }

    function showBadge() {
      const badge = document.getElementById('trivia-playing-badge');
      const nameEl = document.getElementById('trivia-playing-name');
      if (badge) badge.style.display = 'block';
      if (nameEl) nameEl.textContent = myTeam;
    }

    function showTriviaMode(q) {
      if (mode === 'trivia' && !myToken) { showRegister(); return; }
      currentQ       = q;
      selectedAnswer = -1;
      triviaAnswered = false;
      hideAllForms();
      showBadge();
      document.getElementById('page-icon').textContent           = '🧠';
      document.getElementById('page-title').textContent          = 'Bar Trivia!';
      document.getElementById('page-sub').textContent            = 'Pick your answer and submit before time runs out.';
      document.getElementById('trivia-category').textContent     = q.category || '';
      document.getElementById('trivia-q').textContent            = q.question || '';
      document.getElementById('trivia-status').textContent       = '';
      const triviaFormEl = document.getElementById('trivia-form');
      if (triviaFormEl) triviaFormEl.style.display = 'flex';
      // Render options
      const btn = document.getElementById('trivia-btn');
      btn.disabled = false; btn.textContent = 'Submit Answer';
      const optsEl = document.getElementById('trivia-opts');
      optsEl.innerHTML = q.options.map((opt, i) => `
        <button class="trivia-opt-btn" onclick="selectAnswer(${i})" id="trivia-opt-${i}">
          <span class="trivia-opt-letter">${LETTERS[i]}</span>${opt}
        </button>
      `).join('');
    }

    function showWaiting() {
      if (mode === 'trivia' && !myToken) { showRegister(); return; }
      currentQ = null; selectedAnswer = -1;
      hideAllForms();
      showBadge();
      document.getElementById('trivia-waiting').style.display    = 'block';
      document.getElementById('page-icon').textContent           = '🧠';
      document.getElementById('page-title').textContent          = 'Bar Trivia';
      document.getElementById('page-sub').textContent            = 'A question is coming up — stay tuned!';
    }

    function showMessageMode() {
      if (mode === 'trivia') { showWaiting(); return; } // trivia page never shows message form
      currentQ = null; selectedAnswer = -1;
      hideAllForms();
      // Restore tabs + active tab
      document.getElementById('tabs').style.display = 'flex';
      if (activeTab === 'msg') {
        document.getElementById('msg-form').style.display = 'flex';
        document.getElementById('page-icon').textContent  = '🎶';
        document.getElementById('page-title').textContent = 'Send a Message';
        document.getElementById('page-sub').textContent   = 'Your message may appear on the big screen!';
      } else {
        document.getElementById('photo-form').style.display = 'flex';
        document.getElementById('page-icon').textContent    = '📸';
        document.getElementById('page-title').textContent   = 'Share a Photo';
        document.getElementById('page-sub').textContent     = 'Your photo could appear on screen!';
      }
    }

    async function joinTrivia() {
      const nameInput = document.getElementById('team-name-reg-input');
      const name = nameInput?.value?.trim();
      const statusEl = document.getElementById('join-status');
      if (!name) { if (statusEl) statusEl.textContent = 'Please enter a team name.'; return; }
      if (statusEl) statusEl.textContent = '';
      const btn = document.getElementById('btn-join-trivia');
      if (btn) { btn.disabled = true; btn.textContent = 'Joining…'; }
      const token = generateToken();
      try {
        const res = await fetchWithTimeout(ntfyPostUrl(aTopic), {
          method: 'POST',
          body: `TEAM-REG|${name}|${token}`,
          headers: { 'Content-Type': 'text/plain' },
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        myTeam = name; myToken = token;
        localStorage.setItem('trivia-team', name);
        localStorage.setItem('trivia-token', token);
        showWaiting();
      } catch(e) {
        const msg = e.name === 'AbortError' ? '✗ Timed out — check your connection.' : '✗ Failed to join — check your connection.';
        if (statusEl) statusEl.textContent = msg;
        if (btn) { btn.disabled = false; btn.textContent = 'Join Game'; }
      }
    }

    function changeTeam() {
      if (!confirm('Change your team name? Your current answers will be lost.')) return;
      localStorage.removeItem('trivia-team');
      localStorage.removeItem('trivia-token');
      myTeam = ''; myToken = '';
      showRegister();
    }

    function selectAnswer(idx) {
      if (triviaAnswered) return;
      selectedAnswer = idx;
      document.querySelectorAll('.trivia-opt-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === idx);
      });
    }

    function showReveal(correctIndex) {
      triviaAnswered = true;
      const isCorrect = selectedAnswer === correctIndex;

      // Colour the answer buttons
      document.querySelectorAll('.trivia-opt-btn').forEach((btn, i) => {
        btn.disabled = true;
        btn.style.transition = 'background 0.3s, border-color 0.3s, color 0.3s';
        if (i === correctIndex) {
          btn.style.background   = '#0d3a1a';
          btn.style.borderColor  = '#30d158';
          btn.style.color        = '#30d158';
        } else if (i === selectedAnswer) {
          btn.style.background   = '#3a0d0d';
          btn.style.borderColor  = '#ff453a';
          btn.style.color        = '#ff453a';
        }
      });

      // Result message
      const statusEl = document.getElementById('trivia-status');
      if (statusEl) {
        statusEl.textContent  = isCorrect ? '✓ Correct!' : '✗ Wrong!';
        statusEl.style.color  = isCorrect ? '#30d158' : '#ff453a';
        statusEl.style.fontSize   = '22px';
        statusEl.style.fontWeight = '700';
        statusEl.style.marginTop  = '12px';
      }

      // Disable submit button
      const btn = document.getElementById('trivia-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Answer Revealed'; }
    }

    async function submitTrivia() {
      if (selectedAnswer === -1 || !currentQ) {
        document.getElementById('trivia-status').textContent = 'Please select an answer first.';
        return;
      }
      const teamName = myTeam || 'Anonymous';
      const btn = document.getElementById('trivia-btn');
      btn.disabled = true; btn.textContent = 'Submitting…';
      try {
        const body = `TRIVIA|${currentQ.id}|${myTeam || teamName}|${myToken || ''}|${selectedAnswer}`;
        const res  = await fetchWithTimeout(ntfyPostUrl(aTopic), {
          method: 'POST', body,
          headers: { 'Content-Type': 'text/plain' },
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        triviaAnswered = true;
        document.getElementById('trivia-status').innerHTML = '<span style="color:#34c759;font-weight:600">✓ Answer submitted! Good luck!</span>';
        btn.textContent = 'Submitted!';
      } catch(e) {
        const msg = e.name === 'AbortError' ? '✗ Timed out — try again.' : '✗ Failed — check your connection.';
        document.getElementById('trivia-status').textContent = msg;
        btn.disabled = false; btn.textContent = 'Submit Answer';
      }
    }

    // Poll for questions topic
    // Fast (3s) when a question is active — need quick reveal feedback
    // Slower (6s) when waiting to conserve rate limit headroom
    async function pollTrivia() {
      if (!qTopic) return;
      let nextInterval = currentQ && !triviaAnswered ? 3000 : 6000;
      try {
        const since = triviaLastId || 'all';
        const res   = await fetch(ntfyPollUrl(qTopic, since));
        if (!res.ok) { setTimeout(pollTrivia, nextInterval); return; }
        const text  = await res.text();
        text.trim().split('\n').filter(Boolean).forEach(line => {
          try {
            const ev = JSON.parse(line);
            if (ev.id) triviaLastId = ev.id;
            if (ev.event !== 'message' || !ev.message) return;
            const data = JSON.parse(ev.message);
            if (data.type === 'teams' && Array.isArray(data.teams)) {
              knownTeams = data.teams;
              renderKnownTeams();
            } else if (data.type === 'reveal') {
              showReveal(data.correctIndex);
              nextInterval = 6000; // slow down after reveal
            } else if (data.active === false) {
              showMessageMode();
            } else if (data.question && (!currentQ || currentQ.id !== data.id)) {
              showTriviaMode(data);
              nextInterval = 3000; // speed up — question just arrived
            }
          } catch(e) {}
        });
      } catch(e) {}
      setTimeout(pollTrivia, nextInterval);
    }

    if (topic) {
      if (mode === 'trivia') {
        // Trivia-only page: show registration or waiting, then start polling
        if (myTeam && myToken) {
          showWaiting();
        } else {
          showRegister();
        }
        pollTrivia(); // only poll the -q topic in trivia mode
      }
      // Message mode needs no trivia polling — stays on the message form
    }
  </script>
</body>
</html>
