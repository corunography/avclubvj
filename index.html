<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AV Club VJ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f; color: #fff;
      min-height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px;
    }
    .icon  { font-size: 48px; margin-bottom: 16px; }
    h1     { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .sub   { font-size: 14px; color: #888; margin-bottom: 28px; text-align: center; line-height: 1.5; }

    /* ── Message form ── */
    #msg-form { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; }
    textarea {
      width: 100%; height: 110px;
      background: #1c1c1e; border: 1.5px solid #333; border-radius: 14px;
      color: #fff; font-size: 16px; font-family: inherit;
      padding: 14px 16px; resize: none; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    textarea:focus { border-color: #3a7bd5; }
    textarea::placeholder { color: #555; }
    .char-count { font-size: 11px; color: #555; text-align: right; width: 100%; margin-top: 6px; margin-bottom: 14px; }
    .char-count.warn { color: #ff9500; }

    /* ── Trivia form ── */
    #trivia-form { width: 100%; max-width: 480px; display: none; flex-direction: column; gap: 12px; }
    .trivia-question-box {
      background: #1c1c1e; border-radius: 16px; padding: 18px 20px;
      font-size: 17px; font-weight: 700; line-height: 1.4; text-align: center; color: #fff;
    }
    .trivia-category { font-size: 11px; color: #666; text-align: center; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .trivia-opts-grid { display: flex; flex-direction: column; gap: 8px; }
    .trivia-opt-btn {
      width: 100%; background: #1c1c1e; border: 1.5px solid #333;
      border-radius: 12px; color: #fff; font-size: 15px; font-weight: 500;
      font-family: inherit; padding: 14px 16px; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: background 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent; text-align: left;
    }
    .trivia-opt-btn:active { transform: scale(0.98); }
    .trivia-opt-btn.selected { background: #1a3a6e; border-color: #3a7bd5; }
    .trivia-opt-letter {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,0.1); color: #aaa;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .trivia-opt-btn.selected .trivia-opt-letter { background: #3a7bd5; color: #fff; }
    .team-input {
      width: 100%; background: #1c1c1e; border: 1.5px solid #333;
      border-radius: 12px; color: #fff; font-size: 15px; font-family: inherit;
      padding: 12px 16px; outline: none; transition: border-color 0.2s;
    }
    .team-input:focus { border-color: #3a7bd5; }
    .team-input::placeholder { color: #555; }
    #trivia-status { font-size: 13px; text-align: center; min-height: 18px; }
    #trivia-waiting { font-size: 13px; color: #666; text-align: center; margin-top: 8px; }

    /* ── Shared button ── */
    button.main-btn {
      width: 100%; max-width: 440px;
      padding: 16px; background: #3a7bd5; color: #fff;
      border: none; border-radius: 14px;
      font-size: 17px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    button.main-btn:hover  { background: #2d6bc4; }
    button.main-btn:active { transform: scale(0.98); }
    button.main-btn:disabled { background: #2c2c2e; color: #555; cursor: not-allowed; transform: none; }
    #status { margin-top: 18px; font-size: 14px; text-align: center; min-height: 20px; max-width: 440px; line-height: 1.5; }
    .success { color: #34c759; font-weight: 600; }
    .error   { color: #ff453a; }
    .error-setup { color: #ff9500; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="icon" id="page-icon">🎶</div>
  <h1 id="page-title">Send a Message</h1>
  <p class="sub" id="page-sub">Your message may appear on the big screen!</p>

  <!-- Normal message form -->
  <div id="msg-form">
    <textarea id="msg" placeholder="Type your message here…" maxlength="280" oninput="onInput()"></textarea>
    <div class="char-count" id="char-count">0 / 280</div>
    <button class="main-btn" id="btn" onclick="sendMsg()">Send It!</button>
    <div id="status"></div>
  </div>

  <!-- AI Prompt submission form -->
  <div id="ai-prompt-form" style="display:none;width:100%;max-width:440px;flex-direction:column;gap:12px">
    <input type="text" id="ai-submitter-name" placeholder="Your name (optional)" maxlength="40"
      style="width:100%;background:#1c1c1e;border:1.5px solid #333;border-radius:14px;color:#fff;font-size:16px;font-family:inherit;padding:14px 16px;outline:none;transition:border-color 0.2s;-webkit-appearance:none"
      onfocus="this.style.borderColor='#a855f7'" onblur="this.style.borderColor='#333'">
    <textarea id="ai-prompt-text" placeholder="Describe a visual… (e.g. neon jellyfish floating through a purple nebula)" maxlength="300"
      style="width:100%;height:130px;background:#1c1c1e;border:1.5px solid #333;border-radius:14px;color:#fff;font-size:16px;font-family:inherit;padding:14px 16px;resize:none;outline:none;transition:border-color 0.2s;-webkit-appearance:none"
      oninput="onAiInput()" onfocus="this.style.borderColor='#a855f7'" onblur="this.style.borderColor='#333'"></textarea>
    <div class="char-count" id="ai-char-count">0 / 300</div>
    <button class="main-btn" id="ai-btn" onclick="sendAiPrompt()" style="background:#a855f7">✨ Submit Visual Idea</button>
    <div id="ai-status"></div>
  </div>

  <!-- Trivia: registration -->
  <div id="trivia-register-wrap" style="display:none;width:100%;max-width:440px;flex-direction:column;gap:12px">
    <div style="text-align:center;font-size:14px;color:#888;line-height:1.6">Enter your team name to join the game.<br>You'll be locked in for the session.</div>
    <input type="text" id="team-name-reg-input" class="team-input" placeholder="Team name…" maxlength="30" style="text-align:center;font-size:18px;font-weight:700">
    <button class="main-btn" id="btn-join-trivia" onclick="joinTrivia()">Join Game</button>
    <div id="join-status" style="font-size:13px;color:#ff453a;text-align:center;min-height:18px"></div>
    <div id="known-teams-list" style="display:none;font-size:11px;color:#666;text-align:center;line-height:1.8"></div>
  </div>

  <!-- Trivia: registered / waiting -->
  <div id="trivia-playing-badge" style="display:none;font-size:13px;color:#888;text-align:center;margin-bottom:8px;max-width:440px">
    Playing as <strong style="color:#fff" id="trivia-playing-name"></strong>
    <span style="color:#3a7bd5;cursor:pointer;margin-left:8px;font-size:11px" onclick="changeTeam()">Change</span>
  </div>

  <!-- Trivia form -->
  <div id="trivia-form">
    <div class="trivia-category" id="trivia-category"></div>
    <div class="trivia-question-box" id="trivia-q"></div>
    <div class="trivia-opts-grid" id="trivia-opts"></div>
    <button class="main-btn" id="trivia-btn" onclick="submitTrivia()">Submit Answer</button>
    <div id="trivia-status"></div>
  </div>

  <div id="trivia-waiting" style="display:none">⏳ Waiting for the next question…</div>

  <script>
    const params    = new URLSearchParams(location.search);
    const topic     = params.get('t');
    const mode      = params.get('mode') || '';  // 'trivia' = trivia-only page
    const workerUrl = (params.get('w') || '').replace(/\/$/, '');

    // Normalise worker URL — ensure it has a protocol
    // Worker handles R2 storage only (photos, messages, AI prompts)
    const workerBase = workerUrl
      ? (workerUrl.startsWith('http') ? workerUrl : 'https://' + workerUrl).replace(/\/$/, '')
      : '';

    // Tunnel URL — resolved on page load from Worker's /remote-url endpoint.
    // All real-time endpoints (status, trivia, polls) go through the tunnel
    // directly, bypassing the Worker to reduce costs.
    let tunnelBase = '';

    async function resolveTunnel() {
      if (!workerBase || !topic) return;
      try {
        const res = await fetchWithTimeout(
          `${workerBase}/remote-url?venueId=${encodeURIComponent(topic)}`, {}, 6000
        );
        if (!res.ok) return;
        const data = await res.json();
        if (data.tunnelUrl) tunnelBase = data.tunnelUrl.replace(/\/$/, '');
      } catch(_) {}
    }

    // Team identity (persisted across sessions)
    let myTeam    = localStorage.getItem('trivia-team')  || '';
    let myToken   = localStorage.getItem('trivia-token') || '';
    let knownTeams = []; // list of registered team names broadcast by app

    function generateToken() {
      try { return crypto.randomUUID(); } catch(e) {}
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    // Fetch with a hard timeout so requests never hang indefinitely
    function fetchWithTimeout(url, options, ms = 10000) {
      const ctrl = new AbortController();
      const tid  = setTimeout(() => ctrl.abort(), ms);
      return fetch(url, { ...options, signal: ctrl.signal })
        .finally(() => clearTimeout(tid));
    }

    function renderKnownTeams() {
      const el = document.getElementById('known-teams-list');
      if (!el || knownTeams.length === 0) return;
      el.textContent = 'Teams playing: ' + knownTeams.join(' · ');
      el.style.display = 'block';
    }

    if (!topic) {
      document.getElementById('btn').disabled = true;
      document.getElementById('status').innerHTML =
        '<span class="error-setup">No venue code in this link.<br>Please ask the venue for the correct QR code.</span>';
    }

    // ── Message form ──────────────────────────────────────────────────────────
    function onInput() {
      const len = document.getElementById('msg').value.length;
      const el  = document.getElementById('char-count');
      el.textContent = len + ' / 280';
      el.className   = 'char-count' + (len > 240 ? ' warn' : '');
    }

    const COOLDOWN_SEC = 12;
    let cooldownTimer  = null;

    function startCooldown() {
      const btn = document.getElementById('btn');
      let remaining = COOLDOWN_SEC;
      btn.disabled = true;
      btn.textContent = `Wait ${remaining}s…`;
      if (cooldownTimer) clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(cooldownTimer); cooldownTimer = null;
          btn.disabled = false; btn.textContent = 'Send Another!';
        } else {
          btn.textContent = `Wait ${remaining}s…`;
        }
      }, 1000);
    }

    async function sendMsg() {
      const text = document.getElementById('msg').value.trim();
      if (!text || !topic) return;
      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');
      btn.disabled = true; btn.textContent = 'Sending…';
      status.textContent = ''; status.className = '';
      try {
        // Messages go to Worker → R2 storage (app polls Worker for new messages)
        const res = await fetchWithTimeout(
          `${workerBase}/messages?venueId=${encodeURIComponent(topic)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          }
        );
        if (!res.ok) {
          const body = await res.text().catch(() => '');
          throw Object.assign(new Error(body || 'HTTP ' + res.status), {
            status: res.status,
            isQuota: res.status === 429,
          });
        }
        status.innerHTML = '✓ Sent! It may appear on screen shortly.';
        status.className = 'success';
        document.getElementById('msg').value = '';
        onInput();
        startCooldown();
      } catch(e) {
        const isTimeout = e.name === 'AbortError';
        status.textContent = isTimeout
          ? '✗ Request timed out — check your connection and try again.'
          : e.isQuota
            ? '✗ Too many messages — wait a moment and try again.'
            : '✗ Failed to send — check your connection and try again.';
        status.className = 'error';
        btn.textContent = 'Send It!'; btn.disabled = false;
      }
    }

    document.getElementById('msg')?.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });

    // ── Trivia mode ───────────────────────────────────────────────────────────
    let currentQ       = null;
    let selectedAnswer = -1;
    let triviaAnswered = false;

    const LETTERS = ['A','B','C','D'];

    function hideAllForms() {
      ['msg-form','ai-prompt-form','trivia-register-wrap','trivia-form','trivia-waiting'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.style.display = 'none';
      });
      const badge = document.getElementById('trivia-playing-badge');
      if (badge) badge.style.display = 'none';
    }

    function showRegister() {
      hideAllForms();
      document.getElementById('page-icon').textContent  = '🧠';
      document.getElementById('page-title').textContent = 'Bar Trivia';
      document.getElementById('page-sub').textContent   = 'Register your team to play!';
      const wrap = document.getElementById('trivia-register-wrap');
      if (wrap) wrap.style.display = 'flex';
      renderKnownTeams();
    }

    function showBadge() {
      const badge = document.getElementById('trivia-playing-badge');
      const nameEl = document.getElementById('trivia-playing-name');
      if (badge) badge.style.display = 'block';
      if (nameEl) nameEl.textContent = myTeam;
    }

    function showTriviaMode(q) {
      if (mode === 'trivia' && !myToken) { showRegister(); return; }
      currentQ       = q;
      selectedAnswer = -1;
      triviaAnswered = false;
      hideAllForms();
      showBadge();
      document.getElementById('page-icon').textContent           = '🧠';
      document.getElementById('page-title').textContent          = 'Bar Trivia!';
      document.getElementById('page-sub').textContent            = 'Pick your answer and submit before time runs out.';
      document.getElementById('trivia-category').textContent     = q.category || '';
      document.getElementById('trivia-q').textContent            = q.question || '';
      document.getElementById('trivia-status').textContent       = '';
      const triviaFormEl = document.getElementById('trivia-form');
      if (triviaFormEl) triviaFormEl.style.display = 'flex';
      // Render options
      const btn = document.getElementById('trivia-btn');
      btn.disabled = false; btn.textContent = 'Submit Answer';
      const optsEl = document.getElementById('trivia-opts');
      optsEl.innerHTML = q.options.map((opt, i) => `
        <button class="trivia-opt-btn" onclick="selectAnswer(${i})" id="trivia-opt-${i}">
          <span class="trivia-opt-letter">${LETTERS[i]}</span>${opt}
        </button>
      `).join('');
    }

    function showWaiting() {
      if (mode === 'trivia' && !myToken) { showRegister(); return; }
      currentQ = null; selectedAnswer = -1;
      hideAllForms();
      showBadge();
      document.getElementById('trivia-waiting').style.display    = 'block';
      document.getElementById('page-icon').textContent           = '🧠';
      document.getElementById('page-title').textContent          = 'Bar Trivia';
      document.getElementById('page-sub').textContent            = 'A question is coming up — stay tuned!';
    }

    function showMessageMode() {
      if (mode === 'trivia') { showWaiting(); return; } // trivia page never shows message form
      currentQ = null; selectedAnswer = -1;
      hideAllForms();
      document.getElementById('page-icon').textContent           = '🎶';
      document.getElementById('page-title').textContent          = 'Send a Message';
      document.getElementById('page-sub').textContent            = 'Your message may appear on the big screen!';
      const msgForm = document.getElementById('msg-form');
      if (msgForm) msgForm.style.display = 'flex';
    }

    function showAiPromptMode() {
      if (mode === 'trivia') return; // locked to trivia
      currentQ = null; selectedAnswer = -1;
      hideAllForms();
      document.getElementById('page-icon').textContent  = '🎨';
      document.getElementById('page-title').textContent = 'Submit a Visual Idea';
      document.getElementById('page-sub').textContent   = 'Your idea may be generated on the big screen!';
      const form = document.getElementById('ai-prompt-form');
      if (form) form.style.display = 'flex';
      const savedName = localStorage.getItem('ai-prompt-name') || '';
      if (savedName && !document.getElementById('ai-submitter-name').value) {
        document.getElementById('ai-submitter-name').value = savedName;
      }
    }

    async function joinTrivia() {
      const nameInput = document.getElementById('team-name-reg-input');
      const name = nameInput?.value?.trim();
      const statusEl = document.getElementById('join-status');
      if (!name) { if (statusEl) statusEl.textContent = 'Please enter a team name.'; return; }
      if (statusEl) statusEl.textContent = '';
      const btn = document.getElementById('btn-join-trivia');
      if (btn) { btn.disabled = true; btn.textContent = 'Joining…'; }
      const token = generateToken();
      try {
        // Join via tunnel (direct to local server)
        const base = tunnelBase || workerBase;
        if (!base) throw new Error('No connection');
        const url = tunnelBase
          ? `${tunnelBase}/trivia-join`
          : `${workerBase}/trivia-join?venueId=${encodeURIComponent(topic)}`;
        const res = await fetchWithTimeout(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ team: name, token }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        myTeam = name; myToken = token;
        localStorage.setItem('trivia-team', name);
        localStorage.setItem('trivia-token', token);
        showWaiting();
      } catch(e) {
        const msg = e.name === 'AbortError' ? '✗ Timed out — check your connection.' : '✗ Failed to join — check your connection.';
        if (statusEl) statusEl.textContent = msg;
        if (btn) { btn.disabled = false; btn.textContent = 'Join Game'; }
      }
    }

    function changeTeam() {
      if (!confirm('Change your team name? Your current answers will be lost.')) return;
      localStorage.removeItem('trivia-team');
      localStorage.removeItem('trivia-token');
      myTeam = ''; myToken = '';
      showRegister();
    }

    function selectAnswer(idx) {
      if (triviaAnswered) return;
      selectedAnswer = idx;
      document.querySelectorAll('.trivia-opt-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === idx);
      });
    }

    function showReveal(correctIndex) {
      triviaAnswered = true;
      const isCorrect = selectedAnswer === correctIndex;

      // Colour the answer buttons
      document.querySelectorAll('.trivia-opt-btn').forEach((btn, i) => {
        btn.disabled = true;
        btn.style.transition = 'background 0.3s, border-color 0.3s, color 0.3s';
        if (i === correctIndex) {
          btn.style.background   = '#0d3a1a';
          btn.style.borderColor  = '#30d158';
          btn.style.color        = '#30d158';
        } else if (i === selectedAnswer) {
          btn.style.background   = '#3a0d0d';
          btn.style.borderColor  = '#ff453a';
          btn.style.color        = '#ff453a';
        }
      });

      // Result message
      const statusEl = document.getElementById('trivia-status');
      if (statusEl) {
        statusEl.textContent  = isCorrect ? '✓ Correct!' : '✗ Wrong!';
        statusEl.style.color  = isCorrect ? '#30d158' : '#ff453a';
        statusEl.style.fontSize   = '22px';
        statusEl.style.fontWeight = '700';
        statusEl.style.marginTop  = '12px';
      }

      // Disable submit button
      const btn = document.getElementById('trivia-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Answer Revealed'; }
    }

    async function submitTrivia() {
      if (selectedAnswer === -1 || !currentQ) {
        document.getElementById('trivia-status').textContent = 'Please select an answer first.';
        return;
      }
      const btn = document.getElementById('trivia-btn');
      btn.disabled = true; btn.textContent = 'Submitting…';
      try {
        // Submit via tunnel (direct to local server)
        const base = tunnelBase || workerBase;
        if (!base) throw new Error('No connection');
        const url = tunnelBase
          ? `${tunnelBase}/trivia-answer`
          : `${workerBase}/trivia-answer?venueId=${encodeURIComponent(topic)}`;
        const res = await fetchWithTimeout(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            qid: currentQ.id,
            team: myTeam || 'Anonymous',
            token: myToken || '',
            answerIndex: selectedAnswer,
          }),
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        triviaAnswered = true;
        document.getElementById('trivia-status').innerHTML = '<span style="color:#34c759;font-weight:600">✓ Answer submitted! Good luck!</span>';
        btn.textContent = 'Submitted!';
      } catch(e) {
        const msg = e.name === 'AbortError' ? '✗ Timed out — try again.' : '✗ Failed — check your connection.';
        document.getElementById('trivia-status').textContent = msg;
        btn.disabled = false; btn.textContent = 'Submit Answer';
      }
    }

    // ── Trivia polling — fetches /status from tunnel directly ─────────────────
    // Fast (3s) when a question is active — need quick reveal feedback
    // Slower (6s) when waiting to conserve bandwidth
    async function pollTrivia() {
      if (!topic) return;
      let nextInterval = currentQ && !triviaAnswered ? 3000 : 6000;
      const base = tunnelBase || workerBase;
      if (!base) { setTimeout(pollTrivia, nextInterval); return; }
      try {
        const url = tunnelBase
          ? `${tunnelBase}/status`
          : `${workerBase}/trivia-state?venueId=${encodeURIComponent(topic)}`;
        const res = await fetchWithTimeout(url, {}, 6000);
        if (!res.ok) { setTimeout(pollTrivia, nextInterval); return; }
        const raw = await res.json();

        // Normalise: tunnel /status returns full remoteState, Worker returns trivia-only
        const data = tunnelBase ? {
          active:       raw.triviaActive       || false,
          id:           raw.triviaQuestionId   || '',
          question:     raw.triviaQuestion     || '',
          options:      raw.triviaOptions      || [],
          category:     raw.triviaCategory     || '',
          revealed:     raw.triviaRevealed     || false,
          correctIndex: raw.triviaRevealed ? (raw.triviaCorrectIndex ?? -1) : -1,
          teams:        raw.triviaTeams        || [],
          scores:       raw.triviaScores       || [],
          timeLimit:    raw.triviaTimeLimit    || 30,
          startTime:    raw.triviaQuestionStartTime || 0,
        } : raw;

        if (data.teams && Array.isArray(data.teams)) {
          knownTeams = data.teams;
          renderKnownTeams();
        }
        if (data.revealed && !triviaAnswered && currentQ) {
          showReveal(data.correctIndex);
          nextInterval = 6000;
        } else if (!data.active) {
          if (currentQ) showMessageMode();
        } else if (data.question && (!currentQ || currentQ.id !== data.id)) {
          showTriviaMode(data);
          nextInterval = 3000;
        }
      } catch(_) {}
      setTimeout(pollTrivia, nextInterval);
    }

    // ── Dynamic mode switching — polls /status via tunnel every 7s ───────────
    // The submit page auto-switches between message form, AI prompt form, etc.
    // based on what's currently active in the app.
    // 'mode=trivia' in the URL locks the page to trivia-only (used by viz overlay QR).
    let _currentSubmitMode = ''; // track to avoid unnecessary re-renders

    async function fetchAppState() {
      if (!topic) return null;
      try {
        if (tunnelBase) {
          // Direct tunnel — fetch /status and extract feature flags
          const res = await fetchWithTimeout(`${tunnelBase}/status`, {}, 6000);
          if (!res.ok) return null;
          const d = await res.json();
          return {
            aiActive:     !!d.aiActive,
            triviaActive: !!d.triviaActive,
            pollActive:   !!(d.poll && d.poll.active),
          };
        } else if (workerBase) {
          // Fallback to Worker proxy (costs Worker requests but works without tunnel)
          const res = await fetchWithTimeout(
            `${workerBase}/app-state?venueId=${encodeURIComponent(topic)}`, {}, 6000
          );
          if (!res.ok) return null;
          return await res.json();
        }
        return null;
      } catch(_) { return null; }
    }

    function applyAppState(state) {
      if (!state) return;
      const { aiActive, triviaActive } = state;
      let targetMode;
      if (triviaActive) {
        targetMode = 'trivia';
      } else if (aiActive) {
        targetMode = 'ai-prompt';
      } else {
        targetMode = 'message';
      }
      if (targetMode === _currentSubmitMode) return; // no change
      _currentSubmitMode = targetMode;
      if (targetMode === 'trivia') {
        // Slide into trivia: show registration if needed, then start polling
        if (!pollTriviaRunning) {
          pollTriviaRunning = true;
          if (myTeam && myToken) showWaiting(); else showRegister();
          pollTrivia();
        }
      } else if (targetMode === 'ai-prompt') {
        showAiPromptMode();
      } else {
        showMessageMode();
      }
    }

    let pollTriviaRunning = false;
    let appStatePollTimer = null;

    async function pollAppState() {
      const state = await fetchAppState();
      applyAppState(state);
      appStatePollTimer = setTimeout(pollAppState, 7000);
    }

    // ── Init — resolve tunnel URL first, then start polling ──────────────────
    if (topic) {
      resolveTunnel().then(() => {
        if (mode === 'trivia') {
          // Trivia-only page (scanned from viz overlay during a trivia question)
          pollTriviaRunning = true;
          if (myTeam && myToken) showWaiting(); else showRegister();
          pollTrivia();
        } else {
          // Dynamic mode — start by showing message form, then poll for state
          showMessageMode();
          pollAppState();
        }
      });
    }

    // ── AI Prompt form logic ──────────────────────────────────────────────────
    function onAiInput() {
      const len = document.getElementById('ai-prompt-text').value.length;
      const el  = document.getElementById('ai-char-count');
      el.textContent = len + ' / 300';
      el.className   = 'char-count' + (len > 260 ? ' warn' : '');
    }

    let aiCooldownTimer = null;
    function startAiCooldown() {
      const btn = document.getElementById('ai-btn');
      let remaining = 15;
      btn.disabled = true; btn.textContent = `Wait ${remaining}s…`;
      if (aiCooldownTimer) clearInterval(aiCooldownTimer);
      aiCooldownTimer = setInterval(() => {
        remaining--;
        if (remaining <= 0) {
          clearInterval(aiCooldownTimer); aiCooldownTimer = null;
          btn.disabled = false; btn.textContent = '✨ Submit Another Idea';
          btn.style.background = '#a855f7';
        } else {
          btn.textContent = `Wait ${remaining}s…`;
        }
      }, 1000);
    }

    async function sendAiPrompt() {
      const name   = (document.getElementById('ai-submitter-name')?.value || '').trim() || 'Anonymous';
      const prompt = (document.getElementById('ai-prompt-text')?.value   || '').trim();
      if (!prompt) {
        const s = document.getElementById('ai-status');
        s.textContent = 'Please describe a visual first!'; s.className = 'error'; return;
      }
      const btn    = document.getElementById('ai-btn');
      const status = document.getElementById('ai-status');
      btn.disabled = true; btn.textContent = 'Submitting…'; status.textContent = ''; status.className = '';
      try {
        // AI prompts go to Worker → R2 storage (app polls Worker for new prompts)
        const res = await fetchWithTimeout(`${workerBase}/ai-prompts?venueId=${encodeURIComponent(topic)}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, prompt }),
        });
        if (!res.ok) {
          const body = await res.text().catch(() => '');
          throw new Error(body || 'HTTP ' + res.status);
        }
        localStorage.setItem('ai-prompt-name', name); // remember name for next time
        document.getElementById('ai-prompt-text').value = '';
        onAiInput();
        status.innerHTML = '✨ Submitted! It may appear on screen soon.';
        status.className = 'success';
        startAiCooldown();
      } catch(e) {
        const isTimeout = e.name === 'AbortError';
        status.textContent = isTimeout ? '✗ Timed out — try again.' : ('✗ ' + (e.message || 'Failed to send.'));
        status.className = 'error';
        btn.disabled = false; btn.textContent = '✨ Submit Visual Idea'; btn.style.background = '#a855f7';
      }
    }

    document.getElementById('ai-prompt-text')?.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey && e.metaKey) { e.preventDefault(); sendAiPrompt(); }
    });
  </script>
</body>
</html>
