<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Send a Message</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0f;
      color: #fff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      gap: 0;
    }
    .icon  { font-size: 48px; margin-bottom: 16px; }
    h1     { font-size: 22px; font-weight: 700; margin-bottom: 6px; text-align: center; }
    .sub   { font-size: 14px; color: #888; margin-bottom: 28px; text-align: center; line-height: 1.5; }
    textarea {
      width: 100%;
      max-width: 440px;
      height: 110px;
      background: #1c1c1e;
      border: 1.5px solid #333;
      border-radius: 14px;
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      padding: 14px 16px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    textarea:focus { border-color: #3a7bd5; }
    textarea::placeholder { color: #555; }
    .char-count { font-size: 11px; color: #555; text-align: right; max-width: 440px; width: 100%; margin-top: 6px; margin-bottom: 14px; }
    .char-count.warn { color: #ff9500; }
    button {
      width: 100%;
      max-width: 440px;
      padding: 16px;
      background: #3a7bd5;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    button:hover  { background: #2d6bc4; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #2c2c2e; color: #555; cursor: not-allowed; transform: none; }
    #status { margin-top: 18px; font-size: 14px; text-align: center; min-height: 20px; max-width: 440px; line-height: 1.5; }
    .success { color: #34c759; font-weight: 600; }
    .error   { color: #ff453a; }
    .error-setup { color: #ff9500; font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="icon">🎶</div>
  <h1>Send a Message</h1>
  <p class="sub">Your message may appear on the big screen!</p>
  <textarea id="msg" placeholder="Type your message here…" maxlength="280" oninput="onInput()"></textarea>
  <div class="char-count" id="char-count">0 / 280</div>
  <button id="btn" onclick="sendMsg()">Send It!</button>
  <div id="status"></div>

  <script>
    const params = new URLSearchParams(location.search);
    const topic  = params.get('t');

    if (!topic) {
      document.getElementById('btn').disabled = true;
      document.getElementById('status').innerHTML =
        '<span class="error-setup">No venue code found in this link.<br>Please ask the venue for the correct QR code.</span>';
    }

    function onInput() {
      const len = document.getElementById('msg').value.length;
      const el  = document.getElementById('char-count');
      el.textContent = len + ' / 280';
      el.className   = 'char-count' + (len > 240 ? ' warn' : '');
    }

    async function sendMsg() {
      const text = document.getElementById('msg').value.trim();
      if (!text || !topic) return;

      const btn    = document.getElementById('btn');
      const status = document.getElementById('status');

      btn.disabled    = true;
      btn.textContent = 'Sending…';
      status.textContent = '';
      status.className   = '';

      try {
        const res = await fetch('https://ntfy.sh/' + topic, {
          method: 'POST',
          body:   text,
          headers: { 'Content-Type': 'text/plain' },
        });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        status.innerHTML  = '✓ Message sent! It may appear on screen shortly.';
        status.className  = 'success';
        document.getElementById('msg').value = '';
        onInput();
        btn.textContent = 'Send Another!';
        btn.disabled    = false;
      } catch(e) {
        status.textContent = '✗ Failed to send — check your connection and try again.';
        status.className   = 'error';
        btn.textContent    = 'Send It!';
        btn.disabled       = false;
      }
    }

    document.getElementById('msg')?.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
  </script>
</body>
</html>
